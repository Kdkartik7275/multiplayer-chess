<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>♟ Royal Chess</title>
  <script src="/socket.io/socket.io.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>♟ Royal Chess</h1>
    <p class="subtitle">Two-player · Real-time · Browser</p>
  </header>

  <!-- ── LOBBY ─────────────────────────────────────────── -->
  <div id="lobby">

    <!-- Mode Selection -->
    <div id="mode-select">
      <h2>Choose Your Game</h2>
      <div class="mode-cards">
        <button class="mode-card" id="btn-vs-human" onclick="selectMode('human')">
          <span class="mode-icon">⚔️</span>
          <span class="mode-title">vs Player</span>
          <span class="mode-desc">Play with a friend online</span>
        </button>
        <button class="mode-card" id="btn-vs-cpu" onclick="selectMode('cpu')">
          <span class="mode-icon">🤖</span>
          <span class="mode-title">vs Computer</span>
          <span class="mode-desc">Challenge the AI engine</span>
        </button>
      </div>
    </div>

    <!-- Human room panel -->
    <div id="panel-human" class="lobby-panel" style="display:none;">
      <button class="back-btn" onclick="goBack()">← Back</button>
      <h2>Join a Room</h2>
      <div class="input-group">
        <label>Room ID</label>
        <input type="text" id="room-input" placeholder="e.g. room42" maxlength="20" />
      </div>
      <button class="btn btn-primary" onclick="joinRoom()">Enter Room</button>
      <p class="hint">Share the same Room ID with a friend.<br>Two tabs on the same computer also works!</p>
    </div>

    <!-- CPU panel -->
    <div id="panel-cpu" class="lobby-panel" style="display:none;">
      <button class="back-btn" onclick="goBack()">← Back</button>
      <h2>Play vs Computer</h2>
      <div class="input-group">
        <label>Difficulty</label>
        <div class="difficulty-select">
          <button class="diff-btn active" data-diff="easy"   onclick="setDifficulty('easy')">Easy</button>
          <button class="diff-btn"        data-diff="medium" onclick="setDifficulty('medium')">Medium</button>
          <button class="diff-btn"        data-diff="hard"   onclick="setDifficulty('hard')">Hard</button>
        </div>
      </div>
      <div class="diff-description" id="diff-desc">Casual play — great for beginners.</div>
      <button class="btn btn-primary" onclick="joinComputer()">Start Game</button>
    </div>

  </div>

  <!-- ── GAME ──────────────────────────────────────────── -->
  <div id="game">
    <div id="status-bar">
      <div class="player-tag">
        <div class="color-dot" id="my-dot"></div>
        <span id="my-color-label">You</span>
      </div>
      <span id="status-msg">Connecting…</span>
      <div class="turn-indicator" id="turn-badge">—</div>
    </div>

    <!-- Thinking indicator -->
    <div id="thinking-bar" style="display:none;">
      <div class="thinking-dots"><span></span><span></span><span></span></div>
      <span>Computer is thinking…</span>
    </div>

    <div class="board-wrapper">
      <div class="coord-labels" id="rank-labels"></div>
      <div class="board-col">
        <div id="board"></div>
        <div class="col-labels" id="file-labels"></div>
      </div>
    </div>

    <div id="move-log-wrap">
      <h4>Move History</h4>
      <div id="move-log"></div>
    </div>
  </div>

  <!-- ── OVERLAY ────────────────────────────────────────── -->
  <div id="overlay">
    <div class="overlay-box">
      <h2 id="overlay-title">—</h2>
      <p  id="overlay-body">—</p>
      <button class="btn btn-primary" onclick="location.reload()">Play Again</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
